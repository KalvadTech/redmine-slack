name: Bug report
description: Report a problem with the plugin
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in as much
        detail as you can. Issues without reproduction steps may be closed.

  - type: input
    id: plugin_version
    attributes:
      label: Plugin version
      placeholder: 0.1.0
    validations:
      required: true

  - type: input
    id: redmine_version
    attributes:
      label: Redmine version
      placeholder: 6.0.5
    validations:
      required: true

  - type: input
    id: ruby_version
    attributes:
      label: Ruby version
      placeholder: 3.3.5
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened
      description: A clear description of the problem.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Lines from log/production.log or log/development.log tagged [redmine_kalvad_slack].
      render: text

  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: Configuration, screenshots, related issues, etc.
