name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rubocop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install rubocop
        run: gem install rubocop --version '~> 1.71' --no-document

      - name: Run rubocop
        run: rubocop --format github
