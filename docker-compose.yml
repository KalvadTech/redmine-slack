# Local development harness for redmine_kalvad_slack.
#
# Boots an official redmine:6.1 image, bind-mounts this repository as the
# plugin (read-only), and persists SQLite + uploaded files in named volumes
# so restarts keep the data.
#
# Usage:
#   docker compose up        # build/start; first boot runs migrations
#   docker compose down      # stop and remove containers (data persists)
#   docker compose down -v   # also wipe SQLite + files volumes
#
# Browse http://localhost:3000 (admin / admin on first login).

services:
  redmine:
    image: redmine:6.1
    ports:
      - "3000:3000"
    environment:
      # Default language for the seeded data.
      REDMINE_DEFAULT_DATA: en
      # Use SQLite. Leaving REDMINE_DB_* unset makes the entrypoint pick
      # SQLite at /usr/src/redmine/sqlite/redmine.db.
    volumes:
      # Live-mount the plugin source. Restart to pick up code changes.
      - .:/usr/src/redmine/plugins/redmine_kalvad_slack:ro
      - sqlite_data:/usr/src/redmine/sqlite
      - files_data:/usr/src/redmine/files

volumes:
  sqlite_data:
  files_data:
